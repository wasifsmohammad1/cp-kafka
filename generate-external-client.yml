---
# =============================================================================
# Mint a NEW external client cert signed by the cp-ansible self-signed CA.
#
# Runs entirely on the ANSIBLE CONTROL NODE because that's where
# cp-ansible keeps the CA private key (it is never distributed to the
# Kafka hosts — only the public cert is, inside each truststore).
#
# Usage:
#   ansible-playbook -i hosts.yml generate-external-client.yml \
#       -e "client_cn=app-payments client_principal=app-payments"
#
#   # If your CA lives somewhere non-default, override:
#   ansible-playbook ... -e "ca_dir=/root/cp-ansible/generated_ssl_files"
#
# Output (on the control node):
#   ./client_certs/<cn>/<cn>.key            PEM private key
#   ./client_certs/<cn>/<cn>.crt            PEM cert signed by cluster CA
#   ./client_certs/<cn>/<cn>.keystore.jks   JKS keystore
#   ./client_certs/<cn>/truststore.jks      cluster truststore (copied from a broker)
#   ./client_certs/<cn>/ca.crt              CA cert
#   ./client_certs/<cn>/client.properties   ready for kafka-topics / kafka-console-*
# =============================================================================

# -----------------------------------------------------------------------------
# Step 1 — locate the CA + key on the Ansible control node, mint the cert.
# -----------------------------------------------------------------------------
- name: Mint external mTLS client cert (runs on control node)
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    client_cn: "{{ client_cn | default('external-client') }}"
    client_principal: "{{ client_principal | default(client_cn) }}"
    out_dir: "{{ playbook_dir }}/client_certs/{{ client_cn }}"
    # Common cp-ansible CA locations. First match wins. Override with -e ca_dir=...
    ca_search_paths:
      - "{{ ca_dir | default('') }}"
      - "{{ playbook_dir }}/generated_ssl_files"
      - "/root/.ansible/collections/ansible_collections/confluent/platform/playbooks/generated_ssl_files"
      - "/root/generated_ssl_files"
      - "/tmp/generated_ssl_files"
      - "{{ ansible_env.HOME | default('/root') }}/generated_ssl_files"
    keystore_pass: "{{ keystore_pass | default(lookup('password', '/dev/null length=20 chars=ascii_letters,digits')) }}"
    # cp-ansible encrypts the snakeoil CA key. Default for 7.x is "capassword".
    # If your inventory sets ssl_self_signed_ca_password to something else,
    # pass it through:    -e "ca_password=YourPassword"
    ca_password: "{{ ca_password | default(ssl_self_signed_ca_password | default('capassword')) }}"

  tasks:

    # cp-ansible names the CA files with a "-1" suffix, e.g.
    #   snakeoil-ca-1.crt   snakeoil-ca-1.key
    # Some older deploys use the bare "snakeoil-ca.crt" form. We probe both.
    - name: Probe candidate CA filenames in each search path
      ansible.builtin.stat:
        path: "{{ item.0 }}/{{ item.1 }}"
      loop: "{{ (ca_search_paths | reject('equalto','') | list) | product(['snakeoil-ca-1.crt','snakeoil-ca.crt']) | list }}"
      register: ca_probe
      changed_when: false

    - name: Pick the first match (resolves both directory AND filename)
      ansible.builtin.set_fact:
        ca_hit: "{{ (ca_probe.results | selectattr('stat.exists','equalto',true) | list | first) | default({}) }}"

    - name: Fail with a useful message if the CA cannot be located
      ansible.builtin.fail:
        msg: |
          Could not find cp-ansible's snakeoil CA on the control node.
          Searched dirs : {{ ca_search_paths | reject('equalto','') | list }}
          Filenames     : snakeoil-ca-1.crt, snakeoil-ca.crt
          Locate it manually with:
              sudo find / -name 'snakeoil-ca*.crt' 2>/dev/null
          then re-run with: -e "ca_dir=/full/path/to/dir"
      when: ca_hit == {}

    - name: Resolve CA cert + key paths from the matched probe
      ansible.builtin.set_fact:
        ca_dir_resolved: "{{ ca_hit.item.0 }}"
        ca_cert_name: "{{ ca_hit.item.1 }}"
        ca_key_name:  "{{ ca_hit.item.1 | regex_replace('\\.crt$', '.key') }}"

    - name: Confirm CA private key is also present
      ansible.builtin.stat:
        path: "{{ ca_dir_resolved }}/{{ ca_key_name }}"
      register: ca_key_stat

    - name: Fail if CA private key is missing
      ansible.builtin.fail:
        msg: "Found {{ ca_dir_resolved }}/{{ ca_cert_name }} but no matching key {{ ca_key_name }} — cannot sign without it."
      when: not ca_key_stat.stat.exists

    - name: Show the resolved CA location
      ansible.builtin.debug:
        msg: "Using CA cert {{ ca_dir_resolved }}/{{ ca_cert_name }} + key {{ ca_dir_resolved }}/{{ ca_key_name }}"

    # Verify the CA passphrase BEFORE we try to sign so we can fail with a
    # clear, actionable error instead of an opaque openssl one.
    - name: Verify the CA passphrase decrypts the key
      ansible.builtin.command:
        argv:
          - openssl
          - rsa
          - -in
          - "{{ ca_dir_resolved }}/{{ ca_key_name }}"
          - -passin
          - "pass:{{ ca_password }}"
          - -noout
      register: ca_pw_check
      changed_when: false
      failed_when: false

    - name: Fail clearly if the CA passphrase is wrong
      ansible.builtin.fail:
        msg: |
          CA passphrase rejected by openssl when reading
            {{ ca_dir_resolved }}/{{ ca_key_name }}

          Currently trying: '{{ ca_password }}'
          (default is 'capassword' for cp-ansible 7.x; your inventory may
          override via ssl_self_signed_ca_password).

          Find the real passphrase:
            grep -rh ssl_self_signed_ca_password ~/.ansible/collections/ansible_collections/confluent/ 2>/dev/null
            grep -i ssl_self_signed_ca_password hosts.yml

          Or test candidate passphrases by hand:
            openssl rsa -in {{ ca_dir_resolved }}/{{ ca_key_name }} -passin pass:CANDIDATE -noout

          Re-run with: -e "ca_password=<the-real-one>"
      when: ca_pw_check.rc != 0

    - name: Output workspace
      ansible.builtin.file:
        path: "{{ out_dir }}"
        state: directory
        mode: "0700"

    - name: Generate client private key
      ansible.builtin.command: >
        openssl genrsa -out {{ out_dir }}/{{ client_cn }}.key 4096
      args:
        creates: "{{ out_dir }}/{{ client_cn }}.key"

    - name: Generate CSR (CN drives the Kafka principal via the default mapping rule)
      ansible.builtin.command: >
        openssl req -new -key {{ out_dir }}/{{ client_cn }}.key
                    -out {{ out_dir }}/{{ client_cn }}.csr
                    -subj "/CN={{ client_cn }}/OU=apps/O=fmr/L=NA/ST=NA/C=US"
      args:
        creates: "{{ out_dir }}/{{ client_cn }}.csr"

    - name: Sign with the cluster CA (1 year)
      # -passin pass:... feeds the CA-key passphrase in non-interactively.
      # -CAserial writes the serial file into our output dir (the CA dir
      # may be read-only / shared, where -CAcreateserial would explode).
      ansible.builtin.command:
        argv:
          - openssl
          - x509
          - -req
          - -in
          - "{{ out_dir }}/{{ client_cn }}.csr"
          - -CA
          - "{{ ca_dir_resolved }}/{{ ca_cert_name }}"
          - -CAkey
          - "{{ ca_dir_resolved }}/{{ ca_key_name }}"
          - -passin
          - "pass:{{ ca_password }}"
          - -CAcreateserial
          - -CAserial
          - "{{ out_dir }}/ca.srl"
          - -out
          - "{{ out_dir }}/{{ client_cn }}.crt"
          - -days
          - "365"
          - -sha256
      args:
        creates: "{{ out_dir }}/{{ client_cn }}.crt"

    - name: Copy CA cert into the bundle
      ansible.builtin.copy:
        src: "{{ ca_dir_resolved }}/{{ ca_cert_name }}"
        dest: "{{ out_dir }}/ca.crt"
        mode: "0644"
        remote_src: false

    - name: Bundle client + CA into PKCS12
      ansible.builtin.command: >
        openssl pkcs12 -export
            -in       {{ out_dir }}/{{ client_cn }}.crt
            -inkey    {{ out_dir }}/{{ client_cn }}.key
            -certfile {{ out_dir }}/ca.crt
            -name     {{ client_cn }}
            -out      {{ out_dir }}/{{ client_cn }}.p12
            -password pass:{{ keystore_pass }}
      args:
        creates: "{{ out_dir }}/{{ client_cn }}.p12"

    - name: Convert PKCS12 → JKS keystore
      ansible.builtin.command: >
        keytool -importkeystore
            -deststorepass {{ keystore_pass }} -destkeypass {{ keystore_pass }}
            -destkeystore  {{ out_dir }}/{{ client_cn }}.keystore.jks
            -deststoretype JKS
            -srckeystore   {{ out_dir }}/{{ client_cn }}.p12
            -srcstoretype  PKCS12
            -srcstorepass  {{ keystore_pass }}
            -alias         {{ client_cn }}
      args:
        creates: "{{ out_dir }}/{{ client_cn }}.keystore.jks"

# -----------------------------------------------------------------------------
# Step 2 — pull the cluster truststore back from a broker (it has the CA
#          imported already, so external clients can use it directly).
# -----------------------------------------------------------------------------
- name: Fetch cluster truststore from a broker
  hosts: kafka4.ocpll.fmr.com
  become: true
  gather_facts: false
  vars:
    client_cn: "{{ client_cn | default('external-client') }}"
    out_dir: "{{ hostvars['localhost'].playbook_dir | default(playbook_dir) }}/client_certs/{{ client_cn }}"
  tasks:

    - name: Locate the broker truststore
      ansible.builtin.find:
        paths: /var/ssl/private
        patterns:
          - "kafka_broker.truststore.jks"
          - "*.truststore.jks"
      register: ts_find

    - name: Fail if no truststore on broker
      ansible.builtin.fail:
        msg: "No truststore found in /var/ssl/private on {{ inventory_hostname }}"
      when: ts_find.files | length == 0

    - name: Pull the truststore back to the control node
      ansible.builtin.fetch:
        src: "{{ ts_find.files[0].path }}"
        dest: "{{ out_dir }}/truststore.jks"
        flat: true

    - name: Find the truststore credentials file (so we can echo the password)
      ansible.builtin.find:
        paths: /var/ssl/private
        patterns: "*truststore*creds"
      register: ts_creds_find

    - name: Read truststore password (if cp-ansible wrote one)
      ansible.builtin.slurp:
        src: "{{ ts_creds_find.files[0].path }}"
      register: ts_pw_b64
      when: ts_creds_find.files | length > 0

    - name: Stash truststore password as a fact
      ansible.builtin.set_fact:
        truststore_password: "{{ (ts_pw_b64.content | b64decode | trim) if (ts_pw_b64.content is defined) else 'confluenttruststorepass' }}"

# -----------------------------------------------------------------------------
# Step 3 — back on control node: write client.properties using the real
#          truststore password and the keystore password we generated.
# -----------------------------------------------------------------------------
- name: Write client.properties for the new external client
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    client_cn: "{{ client_cn | default('external-client') }}"
    out_dir: "{{ playbook_dir }}/client_certs/{{ client_cn }}"
    truststore_password: "{{ hostvars['kafka4.ocpll.fmr.com'].truststore_password | default('confluenttruststorepass') }}"

  tasks:

    - name: Render client.properties
      ansible.builtin.copy:
        dest: "{{ out_dir }}/client.properties"
        mode: "0600"
        content: |
          # mTLS client config for {{ client_cn }} (principal: User:{{ client_principal | default(client_cn) }})
          security.protocol=SSL
          ssl.truststore.location={{ out_dir }}/truststore.jks
          ssl.truststore.password={{ truststore_password }}
          ssl.keystore.location={{ out_dir }}/{{ client_cn }}.keystore.jks
          ssl.keystore.password={{ keystore_pass | default('CHANGE_ME') }}
          ssl.key.password={{ keystore_pass | default('CHANGE_ME') }}
          ssl.endpoint.identification.algorithm=HTTPS

    - name: Done — what to do next
      ansible.builtin.debug:
        msg: |
          Client bundle written to: {{ out_dir }}
            - {{ client_cn }}.key            (PEM private key)
            - {{ client_cn }}.crt            (PEM cert signed by cluster CA)
            - ca.crt                         (cluster CA)
            - {{ client_cn }}.keystore.jks   (JKS keystore for Kafka clients)
            - truststore.jks                 (copied from kafka4)
            - client.properties              (drop this into --command-config)

          Keystore password: {{ keystore_pass | default('see ./client_certs/' + client_cn + '/client.properties') }}

          Smoke test:
            kafka-topics --bootstrap-server kafka4.ocpll.fmr.com:9094 \
                --command-config {{ out_dir }}/client.properties --list

          With NO authorizer enabled (mTLS-only model) any cert signed by the
          cluster CA is automatically authorized — no ACL needed.
