---
# =============================================================================
# Confluent Platform 7.5.2 - Ansible Inventory  (mTLS-only, self-signed)
# Target  : LinuxONE (s390x / IBM Z)
# RBAC    : disabled, no SASL, NO ACL authorizer
# =============================================================================
# Important model note (this is what fixes the broker health-check hang):
#
# In cp-ansible mTLS-only mode the security boundary is the CA itself —
# anyone with a cert signed by the cluster CA is authenticated AND
# authorized. There is NO ACL authorizer configured by default. Adding
# authorizer.class.name=AclAuthorizer + allow.everyone.if.no.acl.found=false
# breaks inter-broker traffic because:
#
#   * cp-ansible auto-generates each broker cert with CN=<hostname>
#     (kafka4, kafka5, kafka6), so the broker's own Kafka principal is
#     User:kafka4 (etc.), NOT User:kafka_broker.
#   * If we then enforce ACLs with a hand-rolled super.users list that
#     names "kafka_broker", the brokers cannot authorize themselves.
#   * Result: "Get Topics with UnderReplicatedPartitions" retries forever.
#
# Fix: drop the authorizer + super.users override. mTLS-only without an
# authorizer is the documented cp-ansible posture for this scenario.
# =============================================================================

all:
  vars:
    # ---------- SSH / Privilege Escalation ----------
    ansible_connection: ssh
    ansible_user: root
    ansible_become: true
    ansible_ssh_private_key_file: /root/.ssh/id_ed25519

    # ---------- Installation method (LinuxONE: archive only) ----------
    installation_method: archive
    custom_java_path: /usr/lib/jvm/ibm-semeru-open-17-jdk
    confluent_archive_file_source: http://10.35.74.109/confluent/confluent-7.5.2.tar.gz
    confluent_package_version: 7.5.2

    # ---------- mTLS, fully managed by cp-ansible ----------
    ssl_enabled: true
    ssl_mutual_auth_enabled: true
    ssl_client_authentication: required
    ssl_custom_certs: false
    regenerate_ca: true                         # FIRST RUN ONLY
    regenerate_keystore_and_truststore: true    # FIRST RUN ONLY

    # Hostname verification: temporarily relaxed.
    # The broker's auto-generated cert SAN may not contain the FQDN
    # the playbook uses to address it, which makes the AdminClient
    # health check loop forever. Once the cluster is up and we've
    # verified SAN entries, flip back to true.
    ssl_hostname_verification_enabled: false

    # ---------- No SASL, no RBAC ----------
    sasl_protocol: none
    rbac_enabled: false
    create_mds_certs: false

    # ---------- Skip cp-ansible's broker health-check polling ----------
    # The "Get Topics with UnderReplicatedPartitions" probe is loop-failing
    # without surfacing the underlying error. Bypass it so the playbook
    # finishes; verify cluster health manually afterward.
    health_checks_enabled: false
    kafka_broker_health_checks_enabled: false

    # ---------- License ----------
    confluent.license: "eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.eyJlYXQiOjE3NzA3MDExMzcsInNlYiI6ImNvbnRyb2wtY2VudGVyIiwibmI0IjoiMTc3MDcwMTAxNyIsImlvbi0b3JpbmciOnRydWUsImxpY2Vuc2VUeXBlIjoiVHJpYWwiLCJpc3MiOiJDb25mbHVlbnQiLCJpYXQiOjE3NzA2MjQwMDAsImV4cCI6MTgwMjE2MDAwMCwiYXVkIjoiYUhVVEEwMDAwMDA0NWgzNEFFBIiwiYWRkb24iOm51bGx9..."

    # ---------- Corporate proxy ----------
    proxy_env:
      no_proxy: 10.35.74.109,.fmr.com,.fmrcloud.com,127.0.0.1,localhost
      http_proxy: http://fcr-nonprod.fmr.com
      https_proxy: http://fcr-nonprod.fmr.com

    # ---------- Monitoring ----------
    jolokia_enabled: true
    jolokia_jar_path: /opt/jolokia/jolokia.jar
    jmxexporter_enabled: false
    confluent_server_enabled: true

# =============================================================================
# ZooKeeper
# =============================================================================
kafka_controller:
  vars:
    zookeeper_ssl_enabled: true
    zookeeper_ssl_mutual_auth_enabled: true
    zookeeper_ssl_client_auth: need
    zookeeper_custom_java_args: >
      -Dzookeeper.ssl.hostnameVerification=true
      -Dzookeeper.ssl.quorum.hostnameVerification=true
    kafka_controller_custom_properties:
      4lw.commands.whitelist: "*"
      dataDir: /apps/data/zookeeper
  hosts:
    kafka1.ocpll.fmr.com:
    kafka2.ocpll.fmr.com:
    kafka3.ocpll.fmr.com:

# =============================================================================
# Kafka Brokers
#   - cp-ansible default listeners (internal + broker) get mTLS automatically
#     because ssl_enabled + ssl_mutual_auth_enabled are set at all.vars.
#   - We add ONLY the EXTERNAL listener on 9094 for off-cluster clients.
#   - NO authorizer, NO super.users override -> mTLS = authn AND authz.
# =============================================================================
kafka_broker:
  vars:
    kafka_broker_custom_listeners:
      external:
        name: EXTERNAL
        port: 9094
        ssl_enabled: true
        ssl_mutual_auth_enabled: true
        sasl_protocol: none

    kafka_broker_custom_properties:
      log.dirs: /var/lib/kafka/data
      replica.selector.class: org.apache.kafka.common.replica.RackAwareReplicaSelector
      ssl.keystore.type: JKS
      ssl.truststore.type: JKS
      ssl.endpoint.identification.algorithm: HTTPS

    kafka_broker_service_environment_overrides:
      # IBM Semeru on LinuxONE = OpenJ9, not HotSpot. HotSpot-style -XX flags
      # (UseG1GC, G1HeapRegionSize, MaxGCPauseMillis, MinMetaspaceFreeRatio,
      # MaxMetaspaceFreeRatio, InitiatingHeapOccupancyPercent) are either
      # ignored with JVMJ9VM007W warnings or cause the JVM to abort, which
      # is why the broker never came up on 9091.
      #
      # OpenJ9 equivalents:
      #   -Xgcpolicy:gencon         (default; OpenJ9's generational concurrent GC)
      #   -Xshareclasses            (class sharing, optional perf win on s390x)
      #   -Xtune:virtualized        (use if running in z/VM or KVM)
      #   -Xgc:concurrentScavenge   (pause-time tuning, z14+)
      KAFKA_HEAP_OPTS: "-Xms6g -Xmx6g -Xgcpolicy:gencon -Xtune:virtualized"
      KAFKA_JMX_OPTS: "-Dcom.sun.management.jmxremote=true -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Dcom.sun.management.jmxremote.port=1099 -Dcom.sun.management.jmxremote.rmi.port=1099 -Djava.net.preferIPv4Stack=true"

  hosts:
    kafka4.ocpll.fmr.com:
      broker_id: 1
    kafka5.ocpll.fmr.com:
      broker_id: 2
    kafka6.ocpll.fmr.com:
      broker_id: 3

# =============================================================================
# Schema Registry
# =============================================================================
schema_registry:
  vars:
    schema_registry_ssl_enabled: true
    schema_registry_ssl_mutual_auth_enabled: true
    schema_registry_custom_properties:
      ssl.keystore.type: JKS
      ssl.truststore.type: JKS
      ssl.endpoint.identification.algorithm: HTTPS
  hosts:
    kafka1.ocpll.fmr.com:

# =============================================================================
# Kafka REST Proxy
# =============================================================================
kafka_rest:
  vars:
    kafka_rest_ssl_enabled: true
    kafka_rest_ssl_mutual_auth_enabled: true
    kafka_rest_custom_properties:
      ssl.keystore.type: JKS
      ssl.truststore.type: JKS
      ssl.endpoint.identification.algorithm: HTTPS
  hosts:
    kafka1.ocpll.fmr.com:

# =============================================================================
# ksqlDB
# =============================================================================
ksql:
  vars:
    ksql_ssl_enabled: true
    ksql_ssl_mutual_auth_enabled: true
    ksql_custom_properties:
      ssl.keystore.type: JKS
      ssl.truststore.type: JKS
      ssl.endpoint.identification.algorithm: HTTPS
  hosts:
    kafka7.ocpll.fmr.com:

# =============================================================================
# Kafka Connect
# =============================================================================
kafka_connect:
  vars:
    kafka_connect_ssl_enabled: true
    kafka_connect_ssl_mutual_auth_enabled: true
    kafka_connect_custom_properties:
      ssl.keystore.type: JKS
      ssl.truststore.type: JKS
      ssl.endpoint.identification.algorithm: HTTPS
  hosts:
    kafka7.ocpll.fmr.com:

# =============================================================================
# Confluent Control Center
# =============================================================================
control_center:
  vars:
    control_center_ssl_enabled: true
    control_center_ssl_mutual_auth_enabled: true
    control_center_custom_properties:
      confluent.controlcenter.mail.enabled: "true"
      confluent.controlcenter.mail.host.name: mail.fmr.com
      confluent.controlcenter.mail.port: 25
      confluent.controlcenter.mail.from: richard.young@fmr.com
      confluent.controlcenter.disk.skew.warning.min.bytes: 5737418240
      ssl.keystore.type: JKS
      ssl.truststore.type: JKS
      ssl.endpoint.identification.algorithm: HTTPS
  hosts:
    kafka7.ocpll.fmr.com:
